version: '3'

tasks:
  default:
    desc: Set up Arch dependencies
    preconditions:
      - sh: '[ -f /etc/arch-release ]'
        msg: setup-arch only runs on Arch Linux
      - sh: command -v go
        msg: go is required to install httpstat
    cmds:
      - task: sudo-auth
      - task: delta-install
      - task: difftastic-install
      - task: hunkdiff-install
      - task: lazygit-install
      - task: ripgrep-install
      - task: btop-install
      - task: ctop-install
      - task: iperf3-install
      - task: tmux-install
      - task: stow-install
      - task: httping-install
      - task: kubectl-install
      - task: httpstat-install

  sudo-auth:
    internal: true
    desc: Cache sudo credentials
    cmds:
      - sudo -v

  delta-install:
    internal: true
    desc: Install delta
    cmds:
      - sudo pacman -S --noconfirm git-delta

  difftastic-install:
    internal: true
    desc: Install difftastic
    cmds:
      - sudo pacman -S --noconfirm difftastic

  hunkdiff-install:
    internal: true
    desc: Install hunkdiff
    cmds:
      - npm i -g hunkdiff

  lazygit-install:
    internal: true
    desc: Install lazygit
    cmds:
      - sudo pacman -S --noconfirm lazygit

  ripgrep-install:
    internal: true
    desc: Install ripgrep
    cmds:
      - sudo pacman -S --noconfirm ripgrep

  btop-install:
    internal: true
    desc: Install btop
    cmds:
      - sudo pacman -S --noconfirm btop

  ctop-install:
    internal: true
    desc: Install ctop
    cmds:
      - sudo pacman -S --noconfirm ctop

  iperf3-install:
    internal: true
    desc: Install iperf3
    cmds:
      - paru -S --noconfirm iperf3

  tmux-install:
    internal: true
    desc: Install tmux
    cmds:
      - sudo pacman -S --noconfirm tmux

  stow-install:
    internal: true
    desc: Install stow
    cmds:
      - sudo pacman -S --noconfirm stow

  httping-install:
    internal: true
    desc: Install httping
    cmds:
      - sudo pacman -S --noconfirm httping

  kubectl-install:
    internal: true
    desc: Install kubectl
    cmds:
      - sudo pacman -S --noconfirm kubectl

  httpstat-install:
    internal: true
    desc: Install httpstat
    cmds:
      - go install github.com/davecheney/httpstat@latest
