version: "3"

tasks:
  default:
    desc: Update system76-lemur-pro packages and tools
    preconditions:
      - sh: '[ "$(uname -s)" = Linux ]'
        msg: system76-lemur-pro only runs on Linux
    cmds:
      - task: sudo-auth
      - task: pacman-update
      - task: paru-update
      - task: post-upgrade

  sudo-auth:
    internal: true
    desc: Cache sudo credentials
    cmds:
      - sudo -v

  post-upgrade:
    internal: true
    cmds:
      - task: flatpak-update
      - task: neovim-update

  pacman-update:
    internal: true
    desc: Update pacman packages
    cmds:
      - sudo pacman -Syu --noconfirm

  paru-update:
    internal: true
    desc: Update paru packages
    ignore_error: true
    timeout: 60s
    cmds:
      - paru -Syu --noconfirm

  flatpak-update:
    internal: true
    desc: Update Flatpak apps
    ignore_error: true
    timeout: 120s
    cmds:
      - sudo flatpak update -y

  neovim-update:
    internal: true
    desc: Update Neovim plugins
    ignore_error: true
    timeout: 60s
    cmds:
      - 'nvim --headless "+Lazy! update" +qa'
