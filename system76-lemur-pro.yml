version: '3'

tasks:
  default:
    desc: Update system76-lemur-pro packages and tools
    preconditions:
      - sh: '[ "$(uname -s)" = Linux ]'
        msg: system76-lemur-pro only runs on Linux
    cmds:
      - task: sudo-auth
      - task: pacman-update
      - task: paru-update
      - task: post-upgrade

  sudo-auth:
    internal: true
    desc: Cache sudo credentials
    cmds:
      - sudo -v

  post-upgrade:
    internal: true
    deps:
      - flatpak-update
      - npm-flow
      - bun-flow
      - pnpm-update
      - neovim-update
      - vscode-update

  pacman-update:
    internal: true
    desc: Update pacman packages
    cmds:
      - sudo pacman -Syu --noconfirm

  paru-update:
    internal: true
    desc: Update paru packages
    ignore_error: true
    timeout: 60s
    cmds:
      - paru -Syu --noconfirm

  flatpak-update:
    internal: true
    desc: Update Flatpak apps
    ignore_error: true
    timeout: 120s
    cmds:
      - sudo flatpak update -y

  npm-flow:
    internal: true
    cmds:
      - task: npm-install
        ignore_error: true
      - task: npm-update
        ignore_error: true

  npm-install:
    internal: true
    desc: Install latest npm
    ignore_error: true
    timeout: 60s
    cmds:
      - npm install -g npm@latest

  npm-update:
    internal: true
    desc: Update global npm packages
    ignore_error: true
    timeout: 60s
    cmds:
      - npm update -g

  bun-flow:
    internal: true
    cmds:
      - task: bun-upgrade
        ignore_error: true
      - task: bun-global-update
        ignore_error: true

  bun-upgrade:
    internal: true
    desc: Upgrade Bun
    ignore_error: true
    timeout: 60s
    cmds:
      - bun upgrade

  bun-global-update:
    internal: true
    desc: Update global Bun packages
    ignore_error: true
    timeout: 60s
    cmds:
      - bun update -g --latest

  pnpm-update:
    internal: true
    desc: Update global pnpm packages
    ignore_error: true
    timeout: 60s
    cmds:
      - pnpm update -g --latest

  neovim-update:
    internal: true
    desc: Update Neovim plugins
    ignore_error: true
    timeout: 60s
    cmds:
      - 'nvim --headless "+Lazy! update" +qa'

  vscode-update:
    internal: true
    desc: Update VS Code extensions
    ignore_error: true
    timeout: 60s
    cmds:
      - code --update-extensions
