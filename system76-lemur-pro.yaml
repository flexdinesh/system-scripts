version: "0.5"
is_strict: true

processes:
  pacman-update:
    description: Update pacman packages
    command: sudo pacman -Syu --noconfirm

  paru-update:
    description: Update paru packages
    command: paru -Syu --noconfirm
    depends_on:
      pacman-update:
        condition: process_completed_successfully

  flatpak-update:
    description: Update Flatpak apps
    command: sudo flatpak update -y
    depends_on:
      paru-update:
        condition: process_completed_successfully

  npm-install:
    description: Install latest npm
    command: npm install -g npm@latest
    depends_on:
      paru-update:
        condition: process_completed_successfully

  npm-update:
    description: Update global npm packages
    command: npm update -g
    depends_on:
      npm-install:
        condition: process_completed_successfully

  bun-upgrade:
    description: Upgrade Bun
    command: bun upgrade
    depends_on:
      paru-update:
        condition: process_completed_successfully

  bun-global-update:
    description: Update global Bun packages
    command: bun update -g --latest
    depends_on:
      bun-upgrade:
        condition: process_completed_successfully

  pnpm-update:
    description: Update global pnpm packages
    command: pnpm update -g --latest
    depends_on:
      paru-update:
        condition: process_completed_successfully

  neovim-update:
    description: Update Neovim plugins
    command: nvim --headless "+Lazy! update" +qa
    depends_on:
      paru-update:
        condition: process_completed_successfully

  vscode-update:
    description: Update VS Code extensions
    command: code --update-extensions
    depends_on:
      paru-update:
        condition: process_completed_successfully
