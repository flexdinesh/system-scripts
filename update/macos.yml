version: "3"

tasks:
  default:
    desc: Update macOS packages and tools
    preconditions:
      - sh: '[ "$(uname -s)" = Darwin ]'
        msg: update/macos only runs on macOS
    cmds:
      - task: sudo-auth
      - task: homebrew-flow
        ignore_error: true
      - task: post-upgrade

  sudo-auth:
    internal: true
    desc: Cache sudo credentials
    cmds:
      - sudo -v

  post-upgrade:
    internal: true
    cmds:
      - task: neovim-update

  homebrew-flow:
    internal: true
    desc: Update and upgrade Homebrew packages
    cmds:
      - task: brew-update
      - task: brew-upgrade

  brew-update:
    internal: true
    desc: Update Homebrew metadata
    timeout: 5m
    cmds:
      - brew update

  brew-upgrade:
    internal: true
    desc: Upgrade Homebrew packages
    timeout: 30m
    cmds:
      - brew upgrade --greedy

  neovim-update:
    internal: true
    desc: Update Neovim plugins
    ignore_error: true
    timeout: 60s
    cmds:
      - 'nvim --headless "+Lazy! update" +qa'
