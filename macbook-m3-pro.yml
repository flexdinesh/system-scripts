version: '3'

tasks:
  default:
    desc: Update macbook-m3-pro packages and tools
    preconditions:
      - sh: '[ "$(uname -s)" = Darwin ]'
        msg: macbook-m3-pro only runs on macOS
    cmds:
      - task: sudo-auth
      - task: homebrew-flow
        ignore_error: true
      - task: post-upgrade

  sudo-auth:
    internal: true
    desc: Cache sudo credentials
    cmds:
      - sudo -v

  post-upgrade:
    internal: true
    deps:
      - npm-flow
      - bun-flow
      - pnpm-update
      - neovim-update
      - vscode-update

  homebrew-flow:
    internal: true
    desc: Update and upgrade Homebrew packages
    cmds:
      - task: brew-update
      - task: brew-upgrade

  brew-update:
    internal: true
    desc: Update Homebrew metadata
    timeout: 5m
    cmds:
      - brew update

  brew-upgrade:
    internal: true
    desc: Upgrade Homebrew packages
    timeout: 30m
    cmds:
      - brew upgrade --greedy

  npm-flow:
    internal: true
    cmds:
      - task: npm-install
        ignore_error: true
      - task: npm-update
        ignore_error: true

  npm-install:
    internal: true
    desc: Install latest npm
    ignore_error: true
    timeout: 60s
    cmds:
      - npm install -g npm@latest

  npm-update:
    internal: true
    desc: Update global npm packages
    ignore_error: true
    timeout: 60s
    cmds:
      - npm update -g

  bun-flow:
    internal: true
    cmds:
      - task: bun-upgrade
        ignore_error: true
      - task: bun-global-update
        ignore_error: true

  bun-upgrade:
    internal: true
    desc: Upgrade Bun
    ignore_error: true
    timeout: 60s
    cmds:
      - bun upgrade

  bun-global-update:
    internal: true
    desc: Update global Bun packages
    ignore_error: true
    timeout: 60s
    cmds:
      - bun update -g --latest

  pnpm-update:
    internal: true
    desc: Update global pnpm packages
    ignore_error: true
    timeout: 60s
    cmds:
      - pnpm update -g --latest

  neovim-update:
    internal: true
    desc: Update Neovim plugins
    ignore_error: true
    timeout: 60s
    cmds:
      - 'nvim --headless "+Lazy! update" +qa'

  vscode-update:
    internal: true
    desc: Update VS Code extensions
    ignore_error: true
    timeout: 60s
    cmds:
      - code --update-extensions
